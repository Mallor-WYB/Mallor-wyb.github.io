<script>

  let fontStart = 12, fontEnd = 30, colorStart = '#666', colorEnd = '#000';
  let tags = document.querySelector('#tags').children;
  let counts = [];
  for(let i = 0; i < tags.length; i++) {
    counts.push(tags[i].rel);
  }
  let lowest = Math.min.apply(null,counts), highest = Math.max.apply(null,counts);;
  let range = highest - lowest;
  if (range === 0) {
    range = 1;
  }
  let fontIncr, colorIncr;
  fontIncr = (fontEnd - fontStart) / range;
  
  let sColorArr = toRGB(colorStart), eColorArr = toRGB(colorEnd);

  for(let i = 0; i < tags.length; i++) {
    let disCount = tags[i].rel - lowest;
    let fontSize = fontStart + disCount * fontIncr;
    let style = 'font-size: ' + fontSize + 'px;';
    let arr = [];
    for(let c = 0; c < sColorArr.length; c++) {
      if (disCount === 0) {
        disCount = 1;
      }
      let val = (sColorArr[c] - eColorArr[c]) / range * disCount;
      if (val >= 100) {
        val = eColorArr[c];
      } else if (val <= 0) {
        val = sColorArr[c];
      }
      arr[c] = Math.floor(val);
    }
    style += 'color: ' + toHex(arr);
    tags[i].style = style;
  }

  function toRGB(code) {
    if (code.length === 4) {
      code = code.replace(/(\w)(\w)(\w)/gi, "\$1\$1\$2\$2\$3\$3");
    }
    var hex = /(\w{2})(\w{2})(\w{2})/.exec(code);
    return [parseInt(hex[1], 16), parseInt(hex[2], 16), parseInt(hex[3], 16)];
  }

  function toHex(ary) {
    return "#" + ((1 << 24) + (ary[0] << 16) + (ary[1] << 8) + ary[2]).toString(16).slice(1);
  }

			function renderTip(template, context) {
				var tokenReg = /(\\)?\{([^\{\}\\]+)(\\)?\}/g;
				return template.replace(tokenReg, function (word, slash1, token, slash2) {
					if (slash1 || slash2) {
						return word.replace('\\', '');
					}
					var variables = token.replace(/\s/g, '').split('.');
					var currentObject = context;
					var i, length, variable;
					for (i = 0, length = variables.length; i < length; ++i) {
						variable = variables[i];
						currentObject = currentObject[variable];
						if (currentObject === undefined || currentObject === null) return '';
					}
					return currentObject;
				});
			}

			String.prototype.renderTip = function (context) {
				return renderTip(this, context);
			};

<script>

  let sideBarOpen = 'sidebar-open';
  let body = document.body;
  let back2Top = document.querySelector('#back_to_top'),
  back2TopText = document.querySelector('#back_to_top_text'),
  drawerBox = document.querySelector('#drawer_box'),
  rightSideBar = document.querySelector('.sidebar'),
  viewport = document.querySelector('body');

  function scrollAnimation(currentY, targetY) {
   
    let needScrollTop = targetY - currentY
    let _currentY = currentY
    setTimeout(() => {
      const dist = Math.ceil(needScrollTop / 10)
      _currentY += dist
      window.scrollTo(_currentY, currentY)
      if (needScrollTop > 10 || needScrollTop < -10) {
        scrollAnimation(_currentY, targetY)
      } else {
        window.scrollTo(_currentY, targetY)
      }
    }, 1)
  }

  back2Top.addEventListener("click", function(e) {
    scrollAnimation(document.scrollingElement.scrollTop, 0);
    e.stopPropagation();
    return false;
  });
  
  window.addEventListener('scroll', function(e) {
    let percent = document.scrollingElement.scrollTop / (document.scrollingElement.scrollHeight - document.scrollingElement.clientHeight) * 100;
    if (percent > 1 && !back2Top.classList.contains('back-top-active')) {
      back2Top.classList.add('back-top-active');
    }
    if (percent == 0) {
      back2Top.classList.remove('back-top-active');
    }
    if (back2TopText) {
      back2TopText.textContent = Math.floor(percent);
    }
  });

  
  let hasCacu = false;
  window.onresize = function() {
    if (window.width > 991) {
      calcuHeight();
    } else {
      hasCacu = false;
    }
  }

  function calcuHeight() {
    // 动态调整站点概览高度
    if (!hasCacu && back2Top.classList.contains('pisces') || back2Top.classList.contains('gemini')) {
      let sideBar = document.querySelector('.sidebar');
      let navUl = document.querySelector('#site_nav');
      sideBar.style = 'margin-top:' + (navUl.offsetHeight + navUl.offsetTop + 15) + 'px;';
      hasCacu = true;
    }
  }
  calcuHeight();
  
  let open = false, MOTION_TIME = 300, RIGHT_MOVE_DIS = '320px';

  if (drawerBox) {
    let rightMotions = document.querySelectorAll('.right-motion');
    let right = drawerBox.classList.contains('right');

    let transitionDir = right ? "transition.slideRightIn" : "transition.slideLeftIn";

    let openProp, closeProp;
    if (right) {
      openProp = {
        paddingRight: RIGHT_MOVE_DIS 
      };
      closeProp = {
        paddingRight: '0px'
      };
    } else {
      openProp = {
        paddingLeft: RIGHT_MOVE_DIS 
      };
      closeProp = {
        paddingLeft: '0px'
      };
    }

    drawerBox.onclick = function() {
      open = !open;
      window.Velocity(rightSideBar, 'stop');
      window.Velocity(viewport, 'stop');
      window.Velocity(rightMotions, 'stop');
      if (open) {
        window.Velocity(rightSideBar, {
          width: RIGHT_MOVE_DIS
        }, {
          duration: MOTION_TIME,
          begin: function() {
            window.Velocity(rightMotions, transitionDir,{ });
          }
        })
        window.Velocity(viewport, openProp,{
          duration: MOTION_TIME
        });
      } else {
        window.Velocity(rightSideBar, {
          width: '0px'
        }, {
          duration: MOTION_TIME,
          begin: function() {
            window.Velocity(rightMotions, {
              opacity: 0
            });
          }
        })
        window.Velocity(viewport, closeProp ,{
          duration: MOTION_TIME
        });
      }
      for (let i = 0; i < drawerBox.children.length; i++) {
        drawerBox.children[i].classList.toggle('muse-line');
      }
      drawerBox.classList.toggle(sideBarOpen);

        item.setAttribute("target","_blank");
      }
    })

<script>
  //拿来主义(真香)^_^，Clipboard 实现摘自掘金 https://juejin.im/post/5aefeb6e6fb9a07aa43c20af
  window.Clipboard = (function (window, document, navigator) {
    var textArea,
      copy;

    // 判断是不是ios端
    function isOS() {
      return navigator.userAgent.match(/ipad|iphone/i);
    }
    //创建文本元素
    function createTextArea(text) {
      textArea = document.createElement('textArea');
      textArea.value = text;
      textArea.style.width = 0;
      textArea.style.height = 0;
      textArea.clientHeight = 0;
      textArea.clientWidth = 0;
      document.body.appendChild(textArea);
    }
    //选择内容
    function selectText() {
      var range,
        selection;

      if (isOS()) {
        range = document.createRange();
        range.selectNodeContents(textArea);
        selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
        textArea.setSelectionRange(0, 999999);
      } else {
        textArea.select();
      }
    }

    //复制到剪贴板
    function copyToClipboard() {
      try {
        document.execCommand("Copy")
      } catch (err) {
        alert("复制错误！请手动复制！")
      }
      document.body.removeChild(textArea);
    }

    copy = function (text) {
      createTextArea(text);
      selectText();
      copyToClipboard();
    };

    return {
      copy: copy
    };
  })(window, document, navigator);

  function copyCode(e) {
    if (e.srcElement.tagName === 'SPAN' && e.srcElement.classList.contains('copy-code')) {
      let code = e.currentTarget.querySelector('code');
      var text = code.innerText;
      if (e.srcElement.textContent === '复制成功') {
        console.log('复制操作频率过高');
        return;
      }
      e.srcElement.textContent = '复制成功';
      (function (elem) {
        setTimeout(() => {
          if (elem.textContent === '复制成功') {
            elem.textContent = '复制代码'
          }
        }, 1000);
      })(e.srcElement)
      Clipboard.copy(text);
    }
  }

  let pres = document.querySelectorAll('pre');
  pres.forEach(pre => {
    let code = pre.querySelector('code');
    let copyElem = document.createElement('span');
    copyElem.classList.add('copy-code');
    copyElem.textContent = '复制代码';
    pre.appendChild(copyElem);
    pre.onclick = copyCode
  })
</script>

        <a class="result-title" href="https://Mallor-WYB.github.io/post/IDEA插件/"" data-c="

&lt;p&gt;之前敲代码，遇到各种各样的问题，或者敲代码太枯燥，太慢，而我用了插件之后感觉帮助了我很多。&lt;br&gt;
不推荐添加很多插件这样会导致你的IDEA卡顿(不是电脑卡)；&lt;/p&gt;
&lt;ol&gt;
&lt;li&gt;插件：
&lt;ul&gt;
&lt;li&gt;Material Theme UI&lt;/li&gt;
&lt;li&gt;Atom Material File Icons&lt;/li&gt;
&lt;li&gt;MinecraftDev&lt;/li&gt;
&lt;li&gt;Nyan Progress Bar&lt;/li&gt;
&lt;li&gt;codota&lt;/li&gt;
&lt;li&gt;Chinese ​(Simplified)​ Language Pack EAP&lt;/li&gt;
&lt;li&gt;ideavim&lt;/li&gt;
&lt;li&gt;translation&lt;/li&gt;
&lt;li&gt;activate-power-mode&lt;/li&gt;
&lt;/ul&gt;
&lt;/li&gt;
&lt;/ol&gt;
&lt;h2 id=&#34;1material-theme-ui&#34;&gt;1.Material Theme UI&lt;/h2&gt;
&lt;p&gt;找了很多主题，个人感觉这个是最好的主题插件，内置了很多好看的主题，新版本的好像没有更改文件和文件夹图标。&lt;/p&gt;
&lt;h2 id=&#34;2atom-material-file-icons&#34;&gt;2.Atom Material File Icons&lt;/h2&gt;
&lt;p&gt;上文说的没有更改图标，这个插件就可以帮到我们，乍开始用可能不太适应，个人感觉挺好。&lt;/p&gt;
&lt;h2 id=&#34;3minecraftdev&#34;&gt;3.MinecraftDev&lt;/h2&gt;
&lt;p&gt;这个插件你可以选择添加，我个人着迷于MC，所以这个插件可以帮助我们开发，而且它会自动帮你选择依赖。&lt;/p&gt;
&lt;h2 id=&#34;4nyan-progress-bar&#34;&gt;4.Nyan Progress Bar&lt;/h2&gt;
&lt;p&gt;这个插件推荐添加，它可以更改IDEA的加载方式为彩虹猫，挺好看的。&lt;/p&gt;
&lt;h2 id=&#34;5codota&#34;&gt;5.codota&lt;/h2&gt;

&lt;h2 id=&#34;6chinese-simplified-language-pack-eap&#34;&gt;6.Chinese ​(Simplified)​ Language Pack EAP&lt;/h2&gt;

&lt;h2 id=&#34;7ideavim&#34;&gt;7.ideavim&lt;/h2&gt;

&lt;h2 id=&#34;8translation&#34;&gt;8.translation&lt;/h2&gt;

      <div class="item">
        <a class="result-title" href="https://Mallor-WYB.github.io/post/Spigot开发(六)/"" data-c="
          &lt;p&gt;这次我们来学习制作一个简单的GUI&lt;br&gt;
这是也是最后一期，感谢您的陪伴。&lt;/p&gt;
&lt;h2 id=&#34;创建一个包&#34;&gt;创建一个包&lt;/h2&gt;
&lt;p&gt;我们和上次一样，在org.mallor.sky右键新建一个包，我给他命名gui&lt;/p&gt;
&lt;h2 id=&#34;创建类&#34;&gt;创建类&lt;/h2&gt;
&lt;p&gt;我们开始创建一个类，在这里我给他命名位GUI。&lt;/p&gt;
&lt;h2 id=&#34;开始&#34;&gt;开始&lt;/h2&gt;
&lt;p&gt;我们创建类之后，在类的后面输入implements CommandExecutor，他会自动导入类，然后输入下面代码&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-Java&#34;&gt;    @Override
    public boolean onCommand(CommandSender commandSender, Command command, String s, String[] strings) {
        return false;
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;然后呢我们开始创建一个GUI，我们在{}中输入&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-JAVA&#34;&gt;        Player player =(Player)commandSender;
        Inventory GUI =Bukkit.createInventory(null,27, ChatColor.YELLOW+&amp;quot;GUI&amp;quot;);
        player.openInventory(GUI);
        return false;
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;Player player = (Player)commandSender的意思是新建一个player，然后用这个代替Player，而且它等于commandSender中的Player&lt;br&gt;
Inventory GUI =Bukkit.createInventory(null,27, ChatColor.YELLOW+&amp;quot;GUI&amp;quot;);这个的意识是新建一个GUI，它等于Bukkit新建一个GUI，GUI的参数呢，等于括号内的，类型等于null，大小等于27个格(在mc中一般有两种[除了自己新建的]一个是27格，一个是54格)。&lt;br&gt;
player.openInventory(GUI);这个就是玩家触发GUI时输入的指令。&lt;/p&gt;
&lt;h2 id=&#34;注册&#34;&gt;注册&lt;/h2&gt;
&lt;p&gt;GUI注册需要两步，和指令差不多，我们回到主类在onEnable方法中输入&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-Java&#34;&gt;getCommand(&amp;quot;GUI&amp;quot;).setExecutor(new GUI());
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;然后回到plugin.yml，&lt;br&gt;
我们新建一个指令&lt;br&gt;
输入&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-yml&#34;&gt;  GUI:
    description: GUI
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;然后开始构建&lt;/p&gt;
&lt;h2 id=&#34;测试&#34;&gt;测试&lt;/h2&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;1&#34;&gt;&lt;img src=&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596943944558.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;h2 id=&#34;拓展&#34;&gt;拓展&lt;/h2&gt;
&lt;p&gt;现在我们新建了GUI，可是他里面没有东西，而且这个东西玩家可以放入，不过放进去物品就没有了，相当于垃圾箱。所以我们需要放入东西，&lt;br&gt;
我们在我们的GUI参数下输入代码&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-JAVA&#34;&gt;ItemStack item = new ItemStack(Material.BED);
GUI.setItem(10,item);
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;这是我的完整代码&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-Java&#34;&gt;public class GUI implements CommandExecutor {
    @Override
    public boolean onCommand(CommandSender commandSender, Command command, String s, String[] strings) {
        Player player =(Player)commandSender;
        Inventory GUI =Bukkit.createInventory(null,27, ChatColor.YELLOW+&amp;quot;GUI&amp;quot;);
        ItemStack item = new ItemStack(Material.BED);
        player.openInventory(GUI);
        GUI.setItem(10,item);
        return false;
    }
}
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;然后我们构建测试&lt;br&gt;
&lt;img src=&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596961248078.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
他就生成了64个床，这个床我们是可以拿走的，而且你关闭后，在输入指令还可以拿走。&lt;br&gt;
下面我们就需要监听器帮助。&lt;/p&gt;
&lt;h2 id=&#34;创建类-2&#34;&gt;创建类&lt;/h2&gt;
&lt;p&gt;我们首先创建一个类，就叫做InventoryClick(都可以)，然后我们给他导入类，在类的后面加上implements Listener，然后输入下面代码&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-JAVA&#34;&gt; @EventHandler
    public void InventoryClick(InventoryClickEvent event){

}
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;在方法中输入&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-Java&#34;&gt;    @EventHandler
    public void InventoryClick(InventoryClickEvent event){
    if (event.getView().getTitle().equalsIgnoreCase(ChatColor.YELLOW+&amp;quot;GUI&amp;quot;));
    event.setCancelled(true);
    }
&lt;/code&gt;&lt;/pre&gt;
&lt;h2 id=&#34;注册-2&#34;&gt;注册&lt;/h2&gt;
&lt;p&gt;这个和之前一样，在主类中输入下面代码&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-Java&#34;&gt;getServer().getPluginManager().registerEvents(new InventoryClick(),this);
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;剩下的一些用指令打开GUI啥的都很简单，大家可以单独问我，或者看看官方文档。&lt;br&gt;
我在这里就不教学了。&lt;/p&gt;
">从零开始教你编写Spigot插件(六)</a>

          &lt;p&gt;上一期我们讲了指令，这一期我们讲config.yml(配置文件)&lt;/p&gt;
&lt;h2 id=&#34;创建文件&#34;&gt;创建文件&lt;/h2&gt;
&lt;p&gt;要想使用config.yml就需要创建文件，我们在项目根目录创建一个txt文本文件，把他重命名为config.yml&lt;br&gt;
然后打开idea，找到这个文件双击，然后在里面输入&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-yml&#34;&gt;name: SKY
author: Mallor 
a: 1
  b: 2
    c: 3 
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;这里面的东西都可以改变，比如name可以改成mingzi,author可以改成zuozhe&lt;br&gt;
a b c也可以改变。&lt;/p&gt;
&lt;h2 id=&#34;导入&#34;&gt;导入&lt;/h2&gt;
&lt;p&gt;我们已经创建了，就需要想plugin.yml一样导入，我们打开项目结构，找到构件，然后点击加号，就像plugin.yml一样导入。&lt;br&gt;
然后回到主类，在onEnable方法里，输入&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-Java&#34;&gt;savaDefaultConfig();
&lt;/code&gt;&lt;/pre&gt;
&lt;h2 id=&#34;读与写&#34;&gt;读与写&lt;/h2&gt;
&lt;p&gt;在开始之前我给大家几个方法&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-Java&#34;&gt;saveDefaultConfig(); //如果没有config.yml 则导出一个.
 getConfig().getString(&amp;quot;name&amp;quot;); //在配置文件中读取某一项
 getConfig().set(&amp;quot;&amp;quot;,&amp;quot;&amp;quot;); //将配置文件中某一项的值改写为另一个值
saveConfig(); //保存配置文件
reloadConfig(); //重载配置文件
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;现在你应该已经明白了一些基本用法，下面我来给大家举个例子&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-Java&#34;&gt;saveDefaultConfig();
        getLogger().info(getConfig().getString(&amp;quot;name&amp;quot;));
        getLogger().info(getConfig().getString(&amp;quot;author&amp;quot;));
        getLogger().info(getConfig().getString(&amp;quot;a.b.c&amp;quot;));
        getConfig().set(&amp;quot;name&amp;quot;,&amp;quot;Mallor&amp;quot;);
        saveConfig();
        reloadConfig();

&lt;p&gt;直接放在onEnable方法里就可以&lt;/p&gt;
&lt;h2 id=&#34;测试&#34;&gt;测试&lt;/h2&gt;
&lt;p&gt;我们把插件编译成功后，打开服务器会发现自动生成了config.yml文件，然后我们打开里面是我们输入的，我们打开服务器他也会自动读取。&lt;br&gt;
&lt;img src=&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596865441735.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
创建完config之后我们就得使用呗。&lt;br&gt;
首先新建一个类，随意就好了，然后输入下面代码&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;    Plugin plugin =org.mallor.sky.A.getPlugin(org.mallor.sky.A.class);//注意Plugin plugin=你的包.你的主类.getPlugin(你的包.你的主类.class);
     @Override

  b:

          &lt;p&gt;上一期我们讲解了监听器，这一期我们讲解指令&lt;br&gt;
这个可能有点不太理解，所以请认真看。&lt;/p&gt;
&lt;h2 id=&#34;oncommand&#34;&gt;onCommand()&lt;/h2&gt;
&lt;p&gt;打开我们的idea，然后在主类里写一个onCommand方法下面时代码&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-Java&#34;&gt;@Override
    public boolean onCommand(CommandSender sender, Command command, String label, String[] args) {
        return true;
    }
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;这个应该很简单吧，我就不讲解了，不明白的私聊我，或者在下面评论。&lt;/p&gt;
&lt;h2 id=&#34;注册&#34;&gt;注册&lt;/h2&gt;
&lt;p&gt;我们知道监听器主类都需要注册，命令也同样需要，不过这个有点和他们不一样，这个需要在plugin.yml里面，&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-yml&#34;&gt;commands:
   cmd:
      description: 这是一个命令.
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;cmd时你想要的命令，你可以替换成你的，description是对命令的介绍，&lt;/p&gt;
&lt;h2 id=&#34;开始写命令&#34;&gt;开始写命令&lt;/h2&gt;
&lt;p&gt;回到 onCommand().&lt;br&gt;
首先我们要从sender这获取到他使用的是什么命令.&lt;br&gt;
Command类下的getName()可以直接获取到这条命令的名称.&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-Java&#34;&gt; String cmd = null;
        cmd = command.getName();
        if (cmd.equalsIgnoreCase(&amp;quot;cmd&amp;quot;)) {
            sender.sendMessage(&amp;quot;Hello World&amp;quot;);
        }
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;在onCommand方法里写这个命令&lt;br&gt;
这个意思时如果输入cmd，那么将会发送Hello World。&lt;br&gt;
这个应该时你的全部代码&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-Java&#34;&gt; @Override
    public boolean onCommand(CommandSender sender, Command command, String label, String[] args) {
        String cmd = null;
        cmd = command.getName();
        if (cmd.equalsIgnoreCase(&amp;quot;cmd&amp;quot;)) {
            sender.sendMessage(&amp;quot;Hello World&amp;quot;);
        }
        return true;
&lt;/code&gt;&lt;/pre&gt;
&lt;h2 id=&#34;尝试&#34;&gt;尝试&lt;/h2&gt;
&lt;p&gt;&lt;img src=&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596858185882.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
输入help+插件名字，就可以看到插件的命令。&lt;/p&gt;
&lt;h2 id=&#34;拓展&#34;&gt;拓展&lt;/h2&gt;
&lt;p&gt;1.我们把命令写在主类有点不方便，所以我们要新建一个类。&lt;br&gt;
然后给这个类implements CommandExecutor，&lt;br&gt;
在下面写入我们的代码&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-Java&#34;&gt;public class cmd implements CommandExecutor {
        public boolean onCommand(CommandSender sender, Command command, String label, String[] args) {
            String cmd = null;
            cmd = command.getName();
            if (cmd.equalsIgnoreCase(&amp;quot;cmd&amp;quot;)) {
                sender.sendMessage(&amp;quot;Hello World&amp;quot;);
            }
            return true;
        }
}
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;这是全部代码&lt;br&gt;
然后回到主类注册，记得把主类之前的删除，然后&lt;br&gt;
在onEnable方法中写入&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-Java&#34;&gt;Bukkit.getPluginCommand(&amp;quot;cmd&amp;quot;).setExecutor(new cmd());
&lt;/code&gt;&lt;/pre&gt;
&lt;h2 id=&#34;再次尝试&#34;&gt;再次尝试&lt;/h2&gt;
&lt;p&gt;&lt;img src=&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596858687394.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
2.我们的指令不一定需要cmd，所以还需要玩家。下面我来教大家怎么判断玩家&lt;br&gt;
我们可以用if-----else&lt;br&gt;
只需要加入&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-Java&#34;&gt;if (sender instanceof Player) {
sender.sendMessage(&amp;quot;Hello World&amp;quot;); //所要执行的内容
}else{
sender.sendMessage(&amp;quot;你必须时一个玩家&amp;quot;);  //所要执行的内容
}
&lt;/code&gt;&lt;/pre&gt;
&lt;h2 id=&#34;再次尝试-2&#34;&gt;再次尝试&lt;/h2&gt;
&lt;p&gt;&lt;img src=&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596859102463.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
好了这一期就到这里，感谢您认真看完，下期再见！！！&lt;/p&gt;

      <div class="item">
        <a class="result-title" href="https://Mallor-WYB.github.io/post/Spigot开发(二)/"" data-c="
          &lt;p&gt;上一期我们讲到了怎么创建一个插件并打包导出运行，这一期我们开始讲解监听器(Listener)的用法&lt;/p&gt;
&lt;h2 id=&#34;首先创建一个类&#34;&gt;首先创建一个类&lt;/h2&gt;
&lt;p&gt;我们呢先创建一个包，直接在我们上次创建的包右键，然后点击package，然后再原来的包的后面有一个点，然后给他命名。我的包名就叫做a，我的完整的就是org.mallor.sky.a，这次我们写一个关于玩家加入的类，我给他命名PlayerJoin。这个是我的完整&lt;img src=&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596779327188.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/p&gt;
&lt;h2 id=&#34;listener&#34;&gt;Listener&lt;/h2&gt;
&lt;p&gt;然后我们在public class PlayerJoin后面写上implements Listener，别忘了导入类。&lt;br&gt;
然后输入以下代码&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-Java&#34;&gt;@EventHandler
public void PlayerJoin(PlayerJoinEvent Event){
String player = Event.getPlayer().getName();
Event.setJoinMessage(&amp;quot;欢迎&amp;quot;+player+&amp;quot;加入了游戏&amp;quot;);
}
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;public void PlayerJoin这个就是声明类，PlayerJoinEvent Event，就是用Event代替PlayerJoinEvent，String就是字符串类型player，说明player等于监听器(Event)，得到玩家，得到玩家的名字，这样就用player代替后面的Event.getPlayer().getName();&lt;br&gt;
Event.setJoinMessage(&amp;quot;欢迎&amp;quot;+player+&amp;quot;加入了游戏&amp;quot;);这个就是监听器发送加入信息:”欢迎玩家加入了游戏“，好了代码写完了。&lt;/p&gt;
&lt;h2 id=&#34;编译&#34;&gt;编译&lt;/h2&gt;
&lt;p&gt;然后我们开始编译，编译之前我们需要给插件注册，就相当于我们把主类注册在plugin.yml，里面一样。&lt;br&gt;
我们只需要在主类的onEnable方法里，也就是在括号内写上&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-Java&#34;&gt; getServer().getPluginManager().registerEvents(new PlayerJoin(),this);
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;这是我的完整代码&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-Java&#34;&gt;public class A extends JavaPlugin {
    @Override
    public void onEnable() {
        getServer().getPluginManager().registerEvents(new PlayerJoin(),this);
        System.out.println(&amp;quot;插件SKY已经成功启动&amp;quot;);
    }
    @Override
    public void onDisable() {
        System.out.println(&amp;quot;插件SKY已经成功关闭&amp;quot;);
    }

}
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;然后就可以编译了。&lt;/p&gt;
&lt;h2 id=&#34;测试&#34;&gt;测试&lt;/h2&gt;
&lt;p&gt;&lt;img src=&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596786646751.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;，我们可以看到他已经加载了，我们来给他一个颜色&lt;br&gt;
我们在Event.setJoinMessage(&amp;quot;欢迎&amp;quot;+player+&amp;quot;加入了游戏&amp;quot;);中的&amp;quot;欢迎&amp;quot;前面输入ChatColor.color这个color输入你喜欢的颜色，比如红色就输入CharColor.RED&lt;br&gt;
完整代码&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-Java&#34;&gt;Event.setJoinMessage(ChatColor.RED+&amp;quot;欢迎&amp;quot;+player+&amp;quot;加入了游戏&amp;quot;);

&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;如果你想要获得更多监听器的你可以去这个网站https://bukkit.windit.net/javadoc/，不会的在下面留言，问我。&lt;br&gt;
好了这期就到这里了，我们下一期讲指令&lt;/p&gt;

      <div class="item">
        <a class="result-title" href="https://Mallor-WYB.github.io/post/Spigit开发(一)/"" data-c="
          &lt;p&gt;从这篇文章开始我来教大家开发Spigot插件&lt;br&gt;
我会把代码放在Github上，地址&lt;a href=&#34;https://github.com/Mallor-WYB/Spigot_Plugin&#34;&gt;传送门&lt;/a&gt;&lt;br&gt;
这个是我在bilibili上的教程视频，可以去看看&lt;/p&gt;
&lt;iframe height=498 width=510 src=&#34;//player.bilibili.com/player.html?aid=756437640&amp;bvid=BV1xr4y1K7Sa&amp;cid=290615844&amp;page=1&#34;&gt;&lt;/iframe&gt;
&lt;h2 id=&#34;首先我们需要准备ide开发工具&#34;&gt;首先我们需要准备IDE开发工具&lt;/h2&gt;
&lt;p&gt;我所知道比较好的有两个IDE一个是IntelliJ IDEA和Eclipse,而我呢则是选择IDEA(比较推荐)。&lt;/p&gt;
&lt;h2 id=&#34;ide选择了然后下载开服核心和jdk&#34;&gt;IDE选择了，然后下载开服核心和JDK&lt;/h2&gt;
&lt;p&gt;大家可以去www.getbukkit.org去下载，记得选择Spigot核心。&lt;br&gt;
JDK可以去oracle这里下载，记得注册一个账号。&lt;/p&gt;
&lt;h2 id=&#34;开始创建项目&#34;&gt;开始创建项目&lt;/h2&gt;
&lt;p&gt;我推荐新手去下载一个汉化，IDEA2020.1已经出来了官方的汉化，可以去官网下载。&lt;br&gt;
然后打开idea, 选择新建项目，然后选择Maven，然后next，下面选择保存位置，然后打开下面的折叠页，第一个是包名，就是xxx.xxx.xxx的这样的格式，也就是把域名倒过来，记得全部小写。我的就是org.mallor.sky&lt;br&gt;
然后下面的是项目名称不用管他，下面的是版本不用管。&lt;/p&gt;
&lt;h2 id=&#34;导入服务器核心&#34;&gt;导入服务器核心&lt;/h2&gt;
&lt;p&gt;创建完项目应该是这样的&lt;img src=&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596685146631.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
然后再你的项目根目录新建一个文件夹,叫做lib(标准的依赖存放位置)，接着把你的开服包放进去。&lt;br&gt;
在里面开服，直接再系统自带的文件管理新建就可以&lt;img src=&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596685425342.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
开服务器应该都会吧，不会的话可以看我的视频，或者加我QQ私聊我639388807&lt;br&gt;
我们点击文件，点击项目结构，找到模块，&lt;img src=&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596685511350.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
&lt;img src=&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596685562494.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;然后点击右边的加，选择jar或者目录，直接选择lib目录下载开服核心就可以。&lt;/p&gt;
&lt;h2 id=&#34;创建一个包&#34;&gt;创建一个包&lt;/h2&gt;
&lt;p&gt;创建包应该很简单了，就是上文提到的xxx.xxx.xxx。&lt;br&gt;
右键main中的java，然后点击新键&lt;img src=&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596687251811.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
&lt;img src=&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596687302403.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
这个就是我们所需要的包名，你可以自定义，英文单词，记得小写，然后回车就可以&lt;br&gt;
。&lt;/p&gt;
&lt;h2 id=&#34;新建一个类&#34;&gt;新建一个类&lt;/h2&gt;
&lt;p&gt;我们新建包之后开始创建主类，右键我们的包，然后点击新建Java类，输入我们类的名字不要有中文大小写都可以。&lt;br&gt;
我直接叫他A了。创建完是这样的&lt;br&gt;
&lt;img src=&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596688105645.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/p&gt;
&lt;h2 id=&#34;开始&#34;&gt;开始！&lt;/h2&gt;
&lt;p&gt;我们再我们的类(A)后面输入extends JavaPlugin，extends前面记得空格。&lt;br&gt;
然后再{}里面输入&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-Java&#34;&gt;@Override
public void onEnable() {
}
@Override
public void onDisable() {
 }
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;然后呢我们再public void onEnable{&lt;br&gt;
}里插入    System.out.println(&amp;quot;&amp;quot;);再&amp;quot;&amp;quot;中间就是你想要说的话比如我的就是&lt;br&gt;
System.out.println(&amp;quot;插件SKY已经成功启动&amp;quot;);&lt;br&gt;
这个的意思是插件SKY已经成功启动，public void onEnable()这个的意思是启动时所要执行的命令，System.out.println这个只要是学过Java的应该都知道，打印某件事，所以这两个连起来就是当插件启动时，插件会说:”插件SKY已经成功启动“&lt;br&gt;
一次类推我们在onDisable里面输入插件已经成功关闭也会在控制台输出。&lt;br&gt;
你可以去试一试。&lt;br&gt;
这时你的全部正确代码&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-Java&#34;&gt;public class A extends JavaPlugin {
    @Override
    public void onEnable() {
        System.out.println(&amp;quot;插件SKY已经成功启动&amp;quot;);
    }
    @Override
    public void onDisable() {
        System.out.println(&amp;quot;插件SKY已经成功关闭&amp;quot;);
    }

} 
&lt;/code&gt;&lt;/pre&gt;
&lt;h2 id=&#34;把插件导出&#34;&gt;把插件导出&lt;/h2&gt;
&lt;p&gt;既然我们已经制作了插件了，我们就需要把他导出来，我们点击文件项目结构&lt;br&gt;
然后点击构件，点击+号，然后按照图片操作&lt;img src=&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596690208762.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
会弹出这个页面&lt;img src=&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596690230270.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
我们在mainclass那里添上你的包名加上你的主类，主类就是刚才新建的类。&lt;br&gt;
就是像我这样&lt;br&gt;
org.mallor.sky.A&lt;br&gt;
然后点击确定，然后找到输出目录，因为我们之前已经开过服务器了，他会自动生成一个叫做Plugins的文件夹，这个就是存放插件的&lt;br&gt;
我们把这个输出目录放进这里，这样我们构建完插件就可以直接运行服务器。&lt;img src=&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596690653554.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
&lt;img src=&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596690658928.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
插件已经好了，剩下的我们还要给插件做一个身份证。&lt;br&gt;
如果你用解压软件打开插件你会发现里面有一个plugin.yml的文件我们记事本把他打开，里面一般有3个基本变量，一个是name,main，version&lt;br&gt;
name就是插件的名字，main，就是他的主类就是我们当时的org.mallor.sky.A&lt;br&gt;
versoin就是插件的版本，我们直接1.0就可以了。&lt;br&gt;
我们在我们项目的根目录下新建文件，&lt;img src=&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596690868284.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
&lt;img src=&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596690892074.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
输入plugin.yml就回车&lt;br&gt;
然后在里面输入三个变量&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-yml&#34;&gt;name: 
main:
version:
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;在:后面记得空格&lt;br&gt;
这个是我的代码&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-yml&#34;&gt;name: SKY
main: org.mallor.sky.A
version: 1.0
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;身份证已经做好了，剩下的就让他带上，不然和没做一样&lt;br&gt;
我们点击文件，点击项目结构，然后打开构建。&lt;br&gt;
&lt;img src=&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596691145191.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
然后找到你的plugin.yml文件直接选择回车。&lt;br&gt;
然后再点击包含着项目结构中，把他选择了&lt;img src=&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596691224218.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
你的是没有点亮的，我们把他给打开。&lt;br&gt;
点击确定退出。&lt;/p&gt;
&lt;h2 id=&#34;开始构建&#34;&gt;开始构建&lt;/h2&gt;
&lt;p&gt;插件做好了，我们就开始构建了。我们可以再菜单栏里看到有一个构建的按钮我们直接点击他，然后点击第一个&lt;br&gt;
&lt;img src=&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596691555893.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
我们就慢慢的等待他，构建完，然后我们再打开服务器，耐心的等待他开服。&lt;br&gt;
我们会看到他会说插件已经成功运行&lt;img src=&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596691704617.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
我们再输入pl指令，会看到有你的插件。&lt;br&gt;
如果你的插件没有识别可能是你的插件在导入依赖没有搞好，再就是你的代码也有问题，或者plugin.yml文件没有构建。&lt;/p&gt;
">从零开始教你编写Spigot插件(一)</a>

&lt;h2 id=&#34;关于梦想&#34;&gt;关于梦想&lt;/h2&gt;
&lt;p&gt;可能我的梦想听起来可笑，但我会用行动去证明。&lt;br&gt;
我的梦想是成为一名软件工程师，并组建自己团队，以至于后来建立起自己的公司。&lt;/p&gt;
&lt;h2 id=&#34;兴趣爱好&#34;&gt;⛹ 兴趣爱好&lt;/h2&gt;
&lt;p&gt;Java,Minecraft,一部分的安卓程序制作，易程序，PHP&lt;/p&gt;
&lt;h2 id=&#34;联系我呀&#34;&gt;📬 联系我呀&lt;/h2&gt;
&lt;p&gt;QQ：639388807&lt;/p&gt;
&lt;h2 id=&#34;️重要问题&#34;&gt;❗❗️重要问题&lt;/h2&gt;
&lt;p&gt;本网站使用Github+Gridea所写，肯定会卡顿(挂梯子会快一点)，所以请不要担心。&lt;br&gt;
请您耐心等待即可。&lt;br&gt;
网站制作不易，还请dalao支持&lt;/p&gt;

<script>
  // var escape = "[{&#34;content&#34;:&#34;&lt;p&gt;转载：&lt;br&gt;\n本文作者： gd1214b&lt;br&gt;\n本文链接： https://blog.gd1214b.icu/post/F2_C5EVQh/&lt;/p&gt;\n&lt;h1 id=\&#34;前言\&#34;&gt;前言&lt;/h1&gt;\n&lt;p&gt;由于众所周知的原因，GitHub在中国大陆地区受到的干扰严重，大部分情况下根本无法连接，这也导致Gridea的同步失败问题。&lt;br&gt;\n&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1623391923562.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;h1 id=\&#34;解决方案\&#34;&gt;解决方案&lt;/h1&gt;\n&lt;p&gt;通常的解决方案是通过代理服务器连接，但由于大部分的代理软件（如v2rayN等），只能更改系统的代理设置，，像Gridea这些不遵守系统代理设置的软件，无法通过代理服务器连接。&lt;br&gt;\n下面介绍一种本人亲测有效的方法, 这种方法的基本原理是用GitHub Desktop将Gridea生成的网页源代码手动push到GitHub上。&lt;/p&gt;\n&lt;h1 id=\&#34;第一步-连接上代理\&#34;&gt;第一步 连接上代理&lt;/h1&gt;\n&lt;p&gt;这一步不做过多讲解。&lt;/p&gt;\n&lt;h1 id=\&#34;第二步-下载并安装github-desktop\&#34;&gt;第二步 下载并安装GitHub Desktop&lt;/h1&gt;\n&lt;p&gt;下载地址：&lt;br&gt;\nhttps://central.GitHub.com/deployments/desktop/desktop/latest/win32&lt;br&gt;\n打开安装程序即可自动完成安装。&lt;/p&gt;\n&lt;h1 id=\&#34;第三步-登陆github账号\&#34;&gt;第三步 登陆GitHub账号&lt;/h1&gt;\n&lt;ol&gt;\n&lt;li&gt;点击 Sign into GitHub.com&lt;br&gt;\n&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1623481745688.jpg\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/li&gt;\n&lt;li&gt;在浏览器里登陆你的GitHub账号&lt;br&gt;\n&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1623481982934.jpg\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h1 id=\&#34;第四步-清空gridea-配置目录下ouput文件夹里的所有内容\&#34;&gt;第四步 清空Gridea 配置目录下ouput文件夹里的所有内容&lt;/h1&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;1\&#34;&gt;&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1623482115749.jpg\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;blockquote&gt;\n&lt;p&gt;需要清空ouput文件夹里的所有内容的原因是GitHub Desktop无法克隆仓库到非空文件夹中，这一步不会影响你的博客数据。&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h3 id=\&#34;注意output文件夹不要删除\&#34;&gt;注意output文件夹不要删除&lt;/h3&gt;\n&lt;h1 id=\&#34;第五步-在github-desktop中克隆你的博客仓库\&#34;&gt;第五步 在GitHub Desktop中克隆你的博客仓库&lt;/h1&gt;\n&lt;p&gt;&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/16653482247255.jpg\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n注意目录要选择Gridea 配置目录下ouput文件夹&lt;br&gt;\n&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/162352482322654.jpg\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;h1 id=\&#34;第六步-同步gridea\&#34;&gt;第六步 同步Gridea&lt;/h1&gt;\n&lt;p&gt;在Gridea中依次点击 远程 &amp;gt; 检测远程连接 &amp;gt; 同步&lt;br&gt;\n这一步无所谓是否同步成功.&lt;br&gt;\n&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1623482746893.jpg\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;h1 id=\&#34;第七步-同步到github上\&#34;&gt;第七步 同步到GitHub上&lt;/h1&gt;\n&lt;p&gt;在GitHub Desktop 中点击 Pushu origin&lt;br&gt;\n&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1623482930640.jpg\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n等候完成即可。&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;有change files的话需要先点击左下角的Commit，才会出现第七步截图里的push origin。&lt;/p&gt;\n&lt;/blockquote&gt;\n&#34;,&#34;fileName&#34;:&#34;解决Gridea同步失败的问题&#34;,&#34;abstract&#34;:&#34;&#34;,&#34;title&#34;:&#34;解决Gridea同步失败的问题&#34;,&#34;tags&#34;:[],&#34;date&#34;:&#34;2021-08-07 12:24:27&#34;,&#34;dateFormat&#34;:&#34;2021-08-07&#34;,&#34;feature&#34;:&#34;&#34;,&#34;link&#34;:&#34;https://Mallor-WYB.github.io/post/解决Gridea同步失败的问题/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;2 min read&#34;,&#34;time&#34;:100000,&#34;words&#34;:455,&#34;minutes&#34;:2},&#34;description&#34;:&#34;转载：\n本文作者： gd1214b\n本文链接： https://blog.gd1214b.icu/post/F2_C5EVQh/\n前言\n由于众所周知的原因，GitHub在中国大陆地区受到的干扰严重，大部分情况下根本无法连接，这也导致Grid...&#34;,&#34;toc&#34;:&#34;&lt;ul class=\&#34;markdownIt-TOC\&#34;&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%89%8D%E8%A8%80\&#34;&gt;前言&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E8%A7%A3%E5%86%B3%E6%96%B9%E6%A1%88\&#34;&gt;解决方案&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E7%AC%AC%E4%B8%80%E6%AD%A5-%E8%BF%9E%E6%8E%A5%E4%B8%8A%E4%BB%A3%E7%90%86\&#34;&gt;第一步 连接上代理&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E7%AC%AC%E4%BA%8C%E6%AD%A5-%E4%B8%8B%E8%BD%BD%E5%B9%B6%E5%AE%89%E8%A3%85github-desktop\&#34;&gt;第二步 下载并安装GitHub Desktop&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E7%AC%AC%E4%B8%89%E6%AD%A5-%E7%99%BB%E9%99%86github%E8%B4%A6%E5%8F%B7\&#34;&gt;第三步 登陆GitHub账号&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E7%AC%AC%E5%9B%9B%E6%AD%A5-%E6%B8%85%E7%A9%BAgridea-%E9%85%8D%E7%BD%AE%E7%9B%AE%E5%BD%95%E4%B8%8Bouput%E6%96%87%E4%BB%B6%E5%A4%B9%E9%87%8C%E7%9A%84%E6%89%80%E6%9C%89%E5%86%85%E5%AE%B9\&#34;&gt;第四步 清空Gridea 配置目录下ouput文件夹里的所有内容&lt;/a&gt;&lt;br&gt;\n*\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%B3%A8%E6%84%8Foutput%E6%96%87%E4%BB%B6%E5%A4%B9%E4%B8%8D%E8%A6%81%E5%88%A0%E9%99%A4\&#34;&gt;注意output文件夹不要删除&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E7%AC%AC%E4%BA%94%E6%AD%A5-%E5%9C%A8github-desktop%E4%B8%AD%E5%85%8B%E9%9A%86%E4%BD%A0%E7%9A%84%E5%8D%9A%E5%AE%A2%E4%BB%93%E5%BA%93\&#34;&gt;第五步 在GitHub Desktop中克隆你的博客仓库&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E7%AC%AC%E5%85%AD%E6%AD%A5-%E5%90%8C%E6%AD%A5gridea\&#34;&gt;第六步 同步Gridea&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E7%AC%AC%E4%B8%83%E6%AD%A5-%E5%90%8C%E6%AD%A5%E5%88%B0github%E4%B8%8A\&#34;&gt;第七步 同步到GitHub上&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&#34;},{&#34;content&#34;:&#34;&lt;p&gt;最近闲的没事，开始折腾起了kali&lt;/p&gt;\n&lt;h2 id=\&#34;下载镜像\&#34;&gt;下载镜像&lt;/h2&gt;\n&lt;p&gt;下载镜像百度就有，&lt;a href =\&#34;https://www.kali.org/\&#34; target=\&#34;_Blank\&#34;&gt;官网&lt;/a&gt;&lt;/p&gt;\n&lt;h2 id=\&#34;安装\&#34;&gt;安装&lt;/h2&gt;\n&lt;p&gt;1.打开我们的VMware(我认为你安装了)，然后新建虚拟机，点典型，然后找到我们的镜像，选择Linux，选择debian8x 64位，然后下一步，硬盘的话30G就可以，内存最低2G，然后运行&lt;br&gt;\n&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1597570747114.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1597570754515.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;p&gt;2.然后来的这个页面&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1597570782189.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;p&gt;我们选择第一个----图形化安装，选择语言和地区，安装时记得把网断了，不然后面会有些麻烦&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1597570920268.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n下面的都是一些基础设置默认下一步。&lt;/p&gt;\n&lt;p&gt;3.下面来到硬盘分区这里，我推荐新手选择第一个，整个磁盘，然后选择把/home,/var,/tmp单独分区。&lt;/p&gt;\n&lt;p&gt;4.下面就到了安装基本系统和软件，这也是最慢的。。。&lt;br&gt;\n然后我们开始安装软件，软件的话别的都不要动，默认就行，要是想换桌面环境可以改改，一共这个几个&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1597571674492.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n然后就是等待。&lt;br&gt;\n5.安装GRUB，下面就是安装GRUB&lt;/p&gt;\n&lt;h2 id=\&#34;完成\&#34;&gt;完成&lt;/h2&gt;\n&#34;,&#34;fileName&#34;:&#34;Kali2020安装&#34;,&#34;abstract&#34;:&#34;&#34;,&#34;title&#34;:&#34;Kali2020安装教程&#34;,&#34;tags&#34;:[{&#34;index&#34;:-1,&#34;name&#34;:&#34;Kali&#34;,&#34;slug&#34;:&#34;Kali&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://Mallor-WYB.github.io/tag/Kali/&#34;}],&#34;date&#34;:&#34;2020-08-16 17:34:28&#34;,&#34;dateFormat&#34;:&#34;2020-08-16&#34;,&#34;feature&#34;:&#34;&#34;,&#34;link&#34;:&#34;https://Mallor-WYB.github.io/post/Kali2020安装/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;1 min read&#34;,&#34;time&#34;:57000,&#34;words&#34;:273,&#34;minutes&#34;:1},&#34;description&#34;:&#34;最近闲的没事，开始折腾起了kali\n下载镜像\n下载镜像百度就有，官网\n安装\n1.打开我们的VMware(我认为你安装了)，然后新建虚拟机，点典型，然后找到我们的镜像，选择Linux，选择debian8x 64位，然后下一步，硬盘的话30G就...&#34;,&#34;toc&#34;:&#34;&lt;ul class=\&#34;markdownIt-TOC\&#34;&gt;\n&lt;li&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E4%B8%8B%E8%BD%BD%E9%95%9C%E5%83%8F\&#34;&gt;下载镜像&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%AE%89%E8%A3%85\&#34;&gt;安装&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%AE%8C%E6%88%90\&#34;&gt;完成&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&#34;},{&#34;content&#34;:&#34;&lt;h2 id=\&#34;心得\&#34;&gt;心得&lt;/h2&gt;\n&lt;p&gt;之前敲代码，遇到各种各样的问题，或者敲代码太枯燥，太慢，而我用了插件之后感觉帮助了我很多。&lt;br&gt;\n不推荐添加很多插件这样会导致你的IDEA卡顿(不是电脑卡)；&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;插件：\n&lt;ul&gt;\n&lt;li&gt;Material Theme UI&lt;/li&gt;\n&lt;li&gt;Atom Material File Icons&lt;/li&gt;\n&lt;li&gt;MinecraftDev&lt;/li&gt;\n&lt;li&gt;Nyan Progress Bar&lt;/li&gt;\n&lt;li&gt;codota&lt;/li&gt;\n&lt;li&gt;Chinese ​(Simplified)​ Language Pack EAP&lt;/li&gt;\n&lt;li&gt;ideavim&lt;/li&gt;\n&lt;li&gt;translation&lt;/li&gt;\n&lt;li&gt;activate-power-mode&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h2 id=\&#34;1material-theme-ui\&#34;&gt;1.Material Theme UI&lt;/h2&gt;\n&lt;p&gt;找了很多主题，个人感觉这个是最好的主题插件，内置了很多好看的主题，新版本的好像没有更改文件和文件夹图标。&lt;/p&gt;\n&lt;h2 id=\&#34;2atom-material-file-icons\&#34;&gt;2.Atom Material File Icons&lt;/h2&gt;\n&lt;p&gt;上文说的没有更改图标，这个插件就可以帮到我们，乍开始用可能不太适应，个人感觉挺好。&lt;/p&gt;\n&lt;h2 id=\&#34;3minecraftdev\&#34;&gt;3.MinecraftDev&lt;/h2&gt;\n&lt;p&gt;这个插件你可以选择添加，我个人着迷于MC，所以这个插件可以帮助我们开发，而且它会自动帮你选择依赖。&lt;/p&gt;\n&lt;h2 id=\&#34;4nyan-progress-bar\&#34;&gt;4.Nyan Progress Bar&lt;/h2&gt;\n&lt;p&gt;这个插件推荐添加，它可以更改IDEA的加载方式为彩虹猫，挺好看的。&lt;/p&gt;\n&lt;h2 id=\&#34;5codota\&#34;&gt;5.codota&lt;/h2&gt;\n&lt;p&gt;这个插件会自动给你提示插件方法等，还会自动给你补全&lt;/p&gt;\n&lt;h2 id=\&#34;6chinese-simplified-language-pack-eap\&#34;&gt;6.Chinese ​(Simplified)​ Language Pack EAP&lt;/h2&gt;\n&lt;p&gt;这个插件就是官方推出的汉化插件，不建议添加，建议刚刚使用IDEA的添加。&lt;/p&gt;\n&lt;h2 id=\&#34;7ideavim\&#34;&gt;7.ideavim&lt;/h2&gt;\n&lt;p&gt;这个插件就是我们常说的Linux的vim编辑器，现在已经一直到IDEA推荐添加。&lt;/p&gt;\n&lt;h2 id=\&#34;8translation\&#34;&gt;8.translation&lt;/h2&gt;\n&lt;p&gt;这个插件也很厉害，支持三大翻译，个人推荐使用谷歌翻译。&lt;/p&gt;\n&lt;h2 id=\&#34;9activate-power-mode\&#34;&gt;9.activate-power-mode&lt;/h2&gt;\n&lt;p&gt;这个插件就是添加了打字特效，如果电脑加载快一点推荐添加。&lt;/p&gt;\n&lt;h2 id=\&#34;写在最后\&#34;&gt;写在最后&lt;/h2&gt;\n&lt;p&gt;像一些美化插件，如果电脑加载慢就不要添加了，不然你敲代码会更烦。&lt;/p&gt;\n&#34;,&#34;fileName&#34;:&#34;IDEA插件&#34;,&#34;abstract&#34;:&#34;&#34;,&#34;title&#34;:&#34;推荐几个IDEA插件&#34;,&#34;tags&#34;:[{&#34;index&#34;:-1,&#34;name&#34;:&#34;Java&#34;,&#34;slug&#34;:&#34;Java&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://Mallor-WYB.github.io/tag/Java/&#34;}],&#34;date&#34;:&#34;2020-08-10 17:58:11&#34;,&#34;dateFormat&#34;:&#34;2020-08-10&#34;,&#34;feature&#34;:&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/IDEA%E6%8F%92%E4%BB%B6.png&#34;,&#34;link&#34;:&#34;https://Mallor-WYB.github.io/post/IDEA插件/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;2 min read&#34;,&#34;time&#34;:98000,&#34;words&#34;:442,&#34;minutes&#34;:2},&#34;description&#34;:&#34;心得\n之前敲代码，遇到各种各样的问题，或者敲代码太枯燥，太慢，而我用了插件之后感觉帮助了我很多。\n不推荐添加很多插件这样会导致你的IDEA卡顿(不是电脑卡)；\n\n插件：\n\nMaterial Theme UI\nAtom Material Fi...&#34;,&#34;toc&#34;:&#34;&lt;ul class=\&#34;markdownIt-TOC\&#34;&gt;\n&lt;li&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%BF%83%E5%BE%97\&#34;&gt;心得&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#1material-theme-ui\&#34;&gt;1.Material Theme UI&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#2atom-material-file-icons\&#34;&gt;2.Atom Material File Icons&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#3minecraftdev\&#34;&gt;3.MinecraftDev&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#4nyan-progress-bar\&#34;&gt;4.Nyan Progress Bar&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#5codota\&#34;&gt;5.codota&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#6chinese-simplified-language-pack-eap\&#34;&gt;6.Chinese ​(Simplified)​ Language Pack EAP&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#7ideavim\&#34;&gt;7.ideavim&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#8translation\&#34;&gt;8.translation&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#9activate-power-mode\&#34;&gt;9.activate-power-mode&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%86%99%E5%9C%A8%E6%9C%80%E5%90%8E\&#34;&gt;写在最后&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&#34;},{&#34;content&#34;:&#34;&lt;p&gt;这次我们来学习制作一个简单的GUI&lt;br&gt;\n这是也是最后一期，感谢您的陪伴。&lt;/p&gt;\n&lt;h2 id=\&#34;创建一个包\&#34;&gt;创建一个包&lt;/h2&gt;\n&lt;p&gt;我们和上次一样，在org.mallor.sky右键新建一个包，我给他命名gui&lt;/p&gt;\n&lt;h2 id=\&#34;创建类\&#34;&gt;创建类&lt;/h2&gt;\n&lt;p&gt;我们开始创建一个类，在这里我给他命名位GUI。&lt;/p&gt;\n&lt;h2 id=\&#34;开始\&#34;&gt;开始&lt;/h2&gt;\n&lt;p&gt;我们创建类之后，在类的后面输入implements CommandExecutor，他会自动导入类，然后输入下面代码&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-Java\&#34;&gt;    @Override\n    public boolean onCommand(CommandSender commandSender, Command command, String s, String[] strings) {\n        return false;\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;然后呢我们开始创建一个GUI，我们在{}中输入&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-JAVA\&#34;&gt;        Player player =(Player)commandSender;\n        Inventory GUI =Bukkit.createInventory(null,27, ChatColor.YELLOW+&amp;quot;GUI&amp;quot;);\n        player.openInventory(GUI);\n        return false;\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;Player player = (Player)commandSender的意思是新建一个player，然后用这个代替Player，而且它等于commandSender中的Player&lt;br&gt;\nInventory GUI =Bukkit.createInventory(null,27, ChatColor.YELLOW+&amp;quot;GUI&amp;quot;);这个的意识是新建一个GUI，它等于Bukkit新建一个GUI，GUI的参数呢，等于括号内的，类型等于null，大小等于27个格(在mc中一般有两种[除了自己新建的]一个是27格，一个是54格)。&lt;br&gt;\nplayer.openInventory(GUI);这个就是玩家触发GUI时输入的指令。&lt;/p&gt;\n&lt;h2 id=\&#34;注册\&#34;&gt;注册&lt;/h2&gt;\n&lt;p&gt;GUI注册需要两步，和指令差不多，我们回到主类在onEnable方法中输入&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-Java\&#34;&gt;getCommand(&amp;quot;GUI&amp;quot;).setExecutor(new GUI());\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;然后回到plugin.yml，&lt;br&gt;\n我们新建一个指令&lt;br&gt;\n输入&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-yml\&#34;&gt;  GUI:\n    description: GUI\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;然后开始构建&lt;/p&gt;\n&lt;h2 id=\&#34;测试\&#34;&gt;测试&lt;/h2&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;1\&#34;&gt;&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596943944558.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;h2 id=\&#34;拓展\&#34;&gt;拓展&lt;/h2&gt;\n&lt;p&gt;现在我们新建了GUI，可是他里面没有东西，而且这个东西玩家可以放入，不过放进去物品就没有了，相当于垃圾箱。所以我们需要放入东西，&lt;br&gt;\n我们在我们的GUI参数下输入代码&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-JAVA\&#34;&gt;ItemStack item = new ItemStack(Material.BED);\nGUI.setItem(10,item);\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;这是我的完整代码&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-Java\&#34;&gt;public class GUI implements CommandExecutor {\n    @Override\n    public boolean onCommand(CommandSender commandSender, Command command, String s, String[] strings) {\n        Player player =(Player)commandSender;\n        Inventory GUI =Bukkit.createInventory(null,27, ChatColor.YELLOW+&amp;quot;GUI&amp;quot;);\n        ItemStack item = new ItemStack(Material.BED);\n        player.openInventory(GUI);\n        GUI.setItem(10,item);\n        return false;\n    }\n}\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;然后我们构建测试&lt;br&gt;\n&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596961248078.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n他就生成了64个床，这个床我们是可以拿走的，而且你关闭后，在输入指令还可以拿走。&lt;br&gt;\n下面我们就需要监听器帮助。&lt;/p&gt;\n&lt;h2 id=\&#34;创建类-2\&#34;&gt;创建类&lt;/h2&gt;\n&lt;p&gt;我们首先创建一个类，就叫做InventoryClick(都可以)，然后我们给他导入类，在类的后面加上implements Listener，然后输入下面代码&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-JAVA\&#34;&gt; @EventHandler\n    public void InventoryClick(InventoryClickEvent event){\n\n}\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;在方法中输入&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-Java\&#34;&gt;    @EventHandler\n    public void InventoryClick(InventoryClickEvent event){\n    if (event.getView().getTitle().equalsIgnoreCase(ChatColor.YELLOW+&amp;quot;GUI&amp;quot;));\n    event.setCancelled(true);\n    }\n&lt;/code&gt;&lt;/pre&gt;\n&lt;h2 id=\&#34;注册-2\&#34;&gt;注册&lt;/h2&gt;\n&lt;p&gt;这个和之前一样，在主类中输入下面代码&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-Java\&#34;&gt;getServer().getPluginManager().registerEvents(new InventoryClick(),this);\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;剩下的一些用指令打开GUI啥的都很简单，大家可以单独问我，或者看看官方文档。&lt;br&gt;\n我在这里就不教学了。&lt;/p&gt;\n&#34;,&#34;fileName&#34;:&#34;Spigot开发(六)&#34;,&#34;abstract&#34;:&#34;&#34;,&#34;title&#34;:&#34;从零开始教你编写Spigot插件(六)&#34;,&#34;tags&#34;:[{&#34;index&#34;:-1,&#34;name&#34;:&#34;Java&#34;,&#34;slug&#34;:&#34;Java&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://Mallor-WYB.github.io/tag/Java/&#34;},{&#34;index&#34;:-1,&#34;name&#34;:&#34;Spigot教程&#34;,&#34;slug&#34;:&#34;spigot&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://Mallor-WYB.github.io/tag/spigot/&#34;}],&#34;date&#34;:&#34;2020-08-09 11:03:25&#34;,&#34;dateFormat&#34;:&#34;2020-08-09&#34;,&#34;feature&#34;:&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/Spigot%E5%BC%80%E5%8F%91(%E4%BA%94).png&#34;,&#34;link&#34;:&#34;https://Mallor-WYB.github.io/post/Spigot开发(六)/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;3 min read&#34;,&#34;time&#34;:168000,&#34;words&#34;:686,&#34;minutes&#34;:3},&#34;description&#34;:&#34;这次我们来学习制作一个简单的GUI\n这是也是最后一期，感谢您的陪伴。\n创建一个包\n我们和上次一样，在org.mallor.sky右键新建一个包，我给他命名gui\n创建类\n我们开始创建一个类，在这里我给他命名位GUI。\n开始\n我们创建类之后，...&#34;,&#34;toc&#34;:&#34;&lt;ul class=\&#34;markdownIt-TOC\&#34;&gt;\n&lt;li&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%88%9B%E5%BB%BA%E4%B8%80%E4%B8%AA%E5%8C%85\&#34;&gt;创建一个包&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%88%9B%E5%BB%BA%E7%B1%BB\&#34;&gt;创建类&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%BC%80%E5%A7%8B\&#34;&gt;开始&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%B3%A8%E5%86%8C\&#34;&gt;注册&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%B5%8B%E8%AF%95\&#34;&gt;测试&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%8B%93%E5%B1%95\&#34;&gt;拓展&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%88%9B%E5%BB%BA%E7%B1%BB-2\&#34;&gt;创建类&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%B3%A8%E5%86%8C-2\&#34;&gt;注册&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&#34;},{&#34;content&#34;:&#34;&lt;p&gt;上一期我们讲了config,这一期我们讲解权限组。&lt;br&gt;\n这个有点简单，认真看。&lt;br&gt;\n我们回到plugin.yml，找到我们的cmd指令，在description下面输入&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-yml\&#34;&gt;permission：op\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;完整代码&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-yml\&#34;&gt;name: SKY\nmain: org.mallor.sky.A\nversion: 1.0\ncommands:\n  cmd:\n    description: 这是一个命令\n    permission: op\n&lt;/code&gt;&lt;/pre&gt;\n&lt;h2 id=\&#34;测试\&#34;&gt;测试&lt;/h2&gt;\n&lt;p&gt;&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596866752744.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596866757592.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n第一个我没有给自己op，第二个给了&lt;br&gt;\n如果你觉得本教程对您有帮助, 不要忘了分享给他人. 如果有错误请指出, 谢谢!&lt;/p&gt;\n&#34;,&#34;fileName&#34;:&#34;Spigot开发(五)&#34;,&#34;abstract&#34;:&#34;&#34;,&#34;title&#34;:&#34;从零开始教你编写Spigot插件(五)&#34;,&#34;tags&#34;:[{&#34;index&#34;:-1,&#34;name&#34;:&#34;Java&#34;,&#34;slug&#34;:&#34;Java&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://Mallor-WYB.github.io/tag/Java/&#34;},{&#34;index&#34;:-1,&#34;name&#34;:&#34;Spigot教程&#34;,&#34;slug&#34;:&#34;spigot&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://Mallor-WYB.github.io/tag/spigot/&#34;}],&#34;date&#34;:&#34;2020-08-08 13:48:34&#34;,&#34;dateFormat&#34;:&#34;2020-08-08&#34;,&#34;feature&#34;:&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/Spigot%E5%BC%80%E5%8F%91(%E4%BA%94).png&#34;,&#34;link&#34;:&#34;https://Mallor-WYB.github.io/post/Spigot开发(五)/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;1 min read&#34;,&#34;time&#34;:28000,&#34;words&#34;:123,&#34;minutes&#34;:1},&#34;description&#34;:&#34;上一期我们讲了config,这一期我们讲解权限组。\n这个有点简单，认真看。\n我们回到plugin.yml，找到我们的cmd指令，在description下面输入\npermission：op\n\n完整代码\nname: SKY\nmain: org...&#34;,&#34;toc&#34;:&#34;&lt;ul class=\&#34;markdownIt-TOC\&#34;&gt;\n&lt;li&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%B5%8B%E8%AF%95\&#34;&gt;测试&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&#34;},{&#34;content&#34;:&#34;&lt;p&gt;上一期我们讲了指令，这一期我们讲config.yml(配置文件)&lt;/p&gt;\n&lt;h2 id=\&#34;创建文件\&#34;&gt;创建文件&lt;/h2&gt;\n&lt;p&gt;要想使用config.yml就需要创建文件，我们在项目根目录创建一个txt文本文件，把他重命名为config.yml&lt;br&gt;\n然后打开idea，找到这个文件双击，然后在里面输入&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-yml\&#34;&gt;name: SKY\nauthor: Mallor \na: 1\n  b: 2\n    c: 3 \n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;这里面的东西都可以改变，比如name可以改成mingzi,author可以改成zuozhe&lt;br&gt;\na b c也可以改变。&lt;/p&gt;\n&lt;h2 id=\&#34;导入\&#34;&gt;导入&lt;/h2&gt;\n&lt;p&gt;我们已经创建了，就需要想plugin.yml一样导入，我们打开项目结构，找到构件，然后点击加号，就像plugin.yml一样导入。&lt;br&gt;\n然后回到主类，在onEnable方法里，输入&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-Java\&#34;&gt;savaDefaultConfig();\n&lt;/code&gt;&lt;/pre&gt;\n&lt;h2 id=\&#34;读与写\&#34;&gt;读与写&lt;/h2&gt;\n&lt;p&gt;在开始之前我给大家几个方法&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-Java\&#34;&gt;saveDefaultConfig(); //如果没有config.yml 则导出一个.\n getConfig().getString(&amp;quot;name&amp;quot;); //在配置文件中读取某一项\n getConfig().set(&amp;quot;&amp;quot;,&amp;quot;&amp;quot;); //将配置文件中某一项的值改写为另一个值\nsaveConfig(); //保存配置文件\nreloadConfig(); //重载配置文件\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;现在你应该已经明白了一些基本用法，下面我来给大家举个例子&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-Java\&#34;&gt;saveDefaultConfig();\n        getLogger().info(getConfig().getString(&amp;quot;name&amp;quot;));\n        getLogger().info(getConfig().getString(&amp;quot;author&amp;quot;));\n        getLogger().info(getConfig().getString(&amp;quot;a.b.c&amp;quot;));\n        getConfig().set(&amp;quot;name&amp;quot;,&amp;quot;Mallor&amp;quot;);\n        saveConfig();\n        reloadConfig();\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;直接放在onEnable方法里就可以&lt;/p&gt;\n&lt;h2 id=\&#34;测试\&#34;&gt;测试&lt;/h2&gt;\n&lt;p&gt;我们把插件编译成功后，打开服务器会发现自动生成了config.yml文件，然后我们打开里面是我们输入的，我们打开服务器他也会自动读取。&lt;br&gt;\n&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596865441735.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n创建完config之后我们就得使用呗。&lt;br&gt;\n首先新建一个类，随意就好了，然后输入下面代码&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-java\&#34;&gt;    Plugin plugin =org.mallor.sky.A.getPlugin(org.mallor.sky.A.class);//注意Plugin plugin=你的包.你的主类.getPlugin(你的包.你的主类.class);\n     @Override\n    public boolean onCommand(CommandSender commandSender, Command command, String s, String[] strings) {\n        Player player =(Player) commandSender;\n        player.sendMessage(plugin.getConfig().getString(&amp;quot;name&amp;quot;));/*这个name是我\n        在config里面输入的，你也可以自定义。主义getString表示的是String，如果想后面跟bloolean ,你可以改成getBoolean，或者其他的 */\n        return false;\n    }\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;这是我的config&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-yml\&#34;&gt;name: &#39;插件名字:SKY&#39;\nauthor: &#39;作者：Mallor&#39;\na:\n  b:\n    c: &#39;欢迎使用本插件&#39;\n\n&lt;/code&gt;&lt;/pre&gt;\n&lt;h1 id=\&#34;然后还是像指令那样把类写在pluginyml和主类当中千万不要忘记\&#34;&gt;然后还是像指令那样把类写在plugin.yml和主类当中千万不要忘记&lt;/h1&gt;\n&lt;h2 id=\&#34;测试-2\&#34;&gt;测试&lt;/h2&gt;\n&lt;p&gt;&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1603041110199.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n因为我的name是SKY。所以我输入play就会显示name的数值。如果你的出现乱码就需要改变一下你的编码，可以使用notead++等软件，具体可以百度&lt;br&gt;\n所以我们就需要改变一下你的文件的编码把文件的编码改成ANSI就可以。&lt;/p&gt;\n&lt;p&gt;他也会自动读取，好了这一期就到这里下期再见。&lt;/p&gt;\n&#34;,&#34;fileName&#34;:&#34;Spigot开发(四)&#34;,&#34;abstract&#34;:&#34;&#34;,&#34;title&#34;:&#34;从零开始教你编写Spigot插件(四)&#34;,&#34;tags&#34;:[{&#34;index&#34;:-1,&#34;name&#34;:&#34;Java&#34;,&#34;slug&#34;:&#34;Java&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://Mallor-WYB.github.io/tag/Java/&#34;},{&#34;index&#34;:-1,&#34;name&#34;:&#34;Spigot教程&#34;,&#34;slug&#34;:&#34;spigot&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://Mallor-WYB.github.io/tag/spigot/&#34;}],&#34;date&#34;:&#34;2020-08-08 13:16:33&#34;,&#34;dateFormat&#34;:&#34;2020-08-08&#34;,&#34;feature&#34;:&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/Spigot%E5%BC%80%E5%8F%91(%E4%BA%94).png&#34;,&#34;link&#34;:&#34;https://Mallor-WYB.github.io/post/Spigot开发(四)/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;3 min read&#34;,&#34;time&#34;:162000,&#34;words&#34;:684,&#34;minutes&#34;:3},&#34;description&#34;:&#34;上一期我们讲了指令，这一期我们讲config.yml(配置文件)\n创建文件\n要想使用config.yml就需要创建文件，我们在项目根目录创建一个txt文本文件，把他重命名为config.yml\n然后打开idea，找到这个文件双击，然后在里面...&#34;,&#34;toc&#34;:&#34;&lt;ul class=\&#34;markdownIt-TOC\&#34;&gt;\n&lt;li&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%88%9B%E5%BB%BA%E6%96%87%E4%BB%B6\&#34;&gt;创建文件&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%AF%BC%E5%85%A5\&#34;&gt;导入&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E8%AF%BB%E4%B8%8E%E5%86%99\&#34;&gt;读与写&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%B5%8B%E8%AF%95\&#34;&gt;测试&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E7%84%B6%E5%90%8E%E8%BF%98%E6%98%AF%E5%83%8F%E6%8C%87%E4%BB%A4%E9%82%A3%E6%A0%B7%E6%8A%8A%E7%B1%BB%E5%86%99%E5%9C%A8pluginyml%E5%92%8C%E4%B8%BB%E7%B1%BB%E5%BD%93%E4%B8%AD%E5%8D%83%E4%B8%87%E4%B8%8D%E8%A6%81%E5%BF%98%E8%AE%B0\&#34;&gt;然后还是像指令那样把类写在plugin.yml和主类当中千万不要忘记&lt;/a&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%B5%8B%E8%AF%95-2\&#34;&gt;测试&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&#34;},{&#34;content&#34;:&#34;&lt;p&gt;上一期我们讲解了监听器，这一期我们讲解指令&lt;br&gt;\n这个可能有点不太理解，所以请认真看。&lt;/p&gt;\n&lt;h2 id=\&#34;oncommand\&#34;&gt;onCommand()&lt;/h2&gt;\n&lt;p&gt;打开我们的idea，然后在主类里写一个onCommand方法下面时代码&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-Java\&#34;&gt;@Override\n    public boolean onCommand(CommandSender sender, Command command, String label, String[] args) {\n        return true;\n    }\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;这个应该很简单吧，我就不讲解了，不明白的私聊我，或者在下面评论。&lt;/p&gt;\n&lt;h2 id=\&#34;注册\&#34;&gt;注册&lt;/h2&gt;\n&lt;p&gt;我们知道监听器主类都需要注册，命令也同样需要，不过这个有点和他们不一样，这个需要在plugin.yml里面，&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-yml\&#34;&gt;commands:\n   cmd:\n      description: 这是一个命令.\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;cmd时你想要的命令，你可以替换成你的，description是对命令的介绍，&lt;/p&gt;\n&lt;h2 id=\&#34;开始写命令\&#34;&gt;开始写命令&lt;/h2&gt;\n&lt;p&gt;回到 onCommand().&lt;br&gt;\n首先我们要从sender这获取到他使用的是什么命令.&lt;br&gt;\nCommand类下的getName()可以直接获取到这条命令的名称.&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-Java\&#34;&gt; String cmd = null;\n        cmd = command.getName();\n        if (cmd.equalsIgnoreCase(&amp;quot;cmd&amp;quot;)) {\n            sender.sendMessage(&amp;quot;Hello World&amp;quot;);\n        }\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;在onCommand方法里写这个命令&lt;br&gt;\n这个意思时如果输入cmd，那么将会发送Hello World。&lt;br&gt;\n这个应该时你的全部代码&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-Java\&#34;&gt; @Override\n    public boolean onCommand(CommandSender sender, Command command, String label, String[] args) {\n        String cmd = null;\n        cmd = command.getName();\n        if (cmd.equalsIgnoreCase(&amp;quot;cmd&amp;quot;)) {\n            sender.sendMessage(&amp;quot;Hello World&amp;quot;);\n        }\n        return true;\n&lt;/code&gt;&lt;/pre&gt;\n&lt;h2 id=\&#34;尝试\&#34;&gt;尝试&lt;/h2&gt;\n&lt;p&gt;&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596858185882.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n输入help+插件名字，就可以看到插件的命令。&lt;/p&gt;\n&lt;h2 id=\&#34;拓展\&#34;&gt;拓展&lt;/h2&gt;\n&lt;p&gt;1.我们把命令写在主类有点不方便，所以我们要新建一个类。&lt;br&gt;\n然后给这个类implements CommandExecutor，&lt;br&gt;\n在下面写入我们的代码&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-Java\&#34;&gt;public class cmd implements CommandExecutor {\n        public boolean onCommand(CommandSender sender, Command command, String label, String[] args) {\n            String cmd = null;\n            cmd = command.getName();\n            if (cmd.equalsIgnoreCase(&amp;quot;cmd&amp;quot;)) {\n                sender.sendMessage(&amp;quot;Hello World&amp;quot;);\n            }\n            return true;\n        }\n}\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;这是全部代码&lt;br&gt;\n然后回到主类注册，记得把主类之前的删除，然后&lt;br&gt;\n在onEnable方法中写入&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-Java\&#34;&gt;Bukkit.getPluginCommand(&amp;quot;cmd&amp;quot;).setExecutor(new cmd());\n&lt;/code&gt;&lt;/pre&gt;\n&lt;h2 id=\&#34;再次尝试\&#34;&gt;再次尝试&lt;/h2&gt;\n&lt;p&gt;&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596858687394.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n2.我们的指令不一定需要cmd，所以还需要玩家。下面我来教大家怎么判断玩家&lt;br&gt;\n我们可以用if-----else&lt;br&gt;\n只需要加入&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-Java\&#34;&gt;if (sender instanceof Player) {\nsender.sendMessage(&amp;quot;Hello World&amp;quot;); //所要执行的内容\n}else{\nsender.sendMessage(&amp;quot;你必须时一个玩家&amp;quot;);  //所要执行的内容\n}\n&lt;/code&gt;&lt;/pre&gt;\n&lt;h2 id=\&#34;再次尝试-2\&#34;&gt;再次尝试&lt;/h2&gt;\n&lt;p&gt;&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596859102463.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n好了这一期就到这里，感谢您认真看完，下期再见！！！&lt;/p&gt;\n&#34;,&#34;fileName&#34;:&#34;Spigot开发(三)&#34;,&#34;abstract&#34;:&#34;&#34;,&#34;title&#34;:&#34;从零开始教你编写Spigot插件(三)&#34;,&#34;tags&#34;:[{&#34;index&#34;:-1,&#34;name&#34;:&#34;Java&#34;,&#34;slug&#34;:&#34;Java&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://Mallor-WYB.github.io/tag/Java/&#34;},{&#34;index&#34;:-1,&#34;name&#34;:&#34;Spigot教程&#34;,&#34;slug&#34;:&#34;spigot&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://Mallor-WYB.github.io/tag/spigot/&#34;}],&#34;date&#34;:&#34;2020-08-08 11:27:02&#34;,&#34;dateFormat&#34;:&#34;2020-08-08&#34;,&#34;feature&#34;:&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/Spigot%E5%BC%80%E5%8F%91(%E4%BA%94).png&#34;,&#34;link&#34;:&#34;https://Mallor-WYB.github.io/post/Spigot开发(三)/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;3 min read&#34;,&#34;time&#34;:138000,&#34;words&#34;:564,&#34;minutes&#34;:3},&#34;description&#34;:&#34;上一期我们讲解了监听器，这一期我们讲解指令\n这个可能有点不太理解，所以请认真看。\nonCommand()\n打开我们的idea，然后在主类里写一个onCommand方法下面时代码\n@Override\n    public boolean on...&#34;,&#34;toc&#34;:&#34;&lt;ul class=\&#34;markdownIt-TOC\&#34;&gt;\n&lt;li&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#oncommand\&#34;&gt;onCommand()&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%B3%A8%E5%86%8C\&#34;&gt;注册&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%BC%80%E5%A7%8B%E5%86%99%E5%91%BD%E4%BB%A4\&#34;&gt;开始写命令&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%B0%9D%E8%AF%95\&#34;&gt;尝试&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%8B%93%E5%B1%95\&#34;&gt;拓展&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%86%8D%E6%AC%A1%E5%B0%9D%E8%AF%95\&#34;&gt;再次尝试&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%86%8D%E6%AC%A1%E5%B0%9D%E8%AF%95-2\&#34;&gt;再次尝试&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&#34;},{&#34;content&#34;:&#34;&lt;p&gt;上一期我们讲到了怎么创建一个插件并打包导出运行，这一期我们开始讲解监听器(Listener)的用法&lt;/p&gt;\n&lt;h2 id=\&#34;首先创建一个类\&#34;&gt;首先创建一个类&lt;/h2&gt;\n&lt;p&gt;我们呢先创建一个包，直接在我们上次创建的包右键，然后点击package，然后再原来的包的后面有一个点，然后给他命名。我的包名就叫做a，我的完整的就是org.mallor.sky.a，这次我们写一个关于玩家加入的类，我给他命名PlayerJoin。这个是我的完整&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596779327188.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;h2 id=\&#34;listener\&#34;&gt;Listener&lt;/h2&gt;\n&lt;p&gt;然后我们在public class PlayerJoin后面写上implements Listener，别忘了导入类。&lt;br&gt;\n然后输入以下代码&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-Java\&#34;&gt;@EventHandler\npublic void PlayerJoin(PlayerJoinEvent Event){\nString player = Event.getPlayer().getName();\nEvent.setJoinMessage(&amp;quot;欢迎&amp;quot;+player+&amp;quot;加入了游戏&amp;quot;);\n}\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;public void PlayerJoin这个就是声明类，PlayerJoinEvent Event，就是用Event代替PlayerJoinEvent，String就是字符串类型player，说明player等于监听器(Event)，得到玩家，得到玩家的名字，这样就用player代替后面的Event.getPlayer().getName();&lt;br&gt;\nEvent.setJoinMessage(&amp;quot;欢迎&amp;quot;+player+&amp;quot;加入了游戏&amp;quot;);这个就是监听器发送加入信息:”欢迎玩家加入了游戏“，好了代码写完了。&lt;/p&gt;\n&lt;h2 id=\&#34;编译\&#34;&gt;编译&lt;/h2&gt;\n&lt;p&gt;然后我们开始编译，编译之前我们需要给插件注册，就相当于我们把主类注册在plugin.yml，里面一样。&lt;br&gt;\n我们只需要在主类的onEnable方法里，也就是在括号内写上&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-Java\&#34;&gt; getServer().getPluginManager().registerEvents(new PlayerJoin(),this);\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;这是我的完整代码&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-Java\&#34;&gt;public class A extends JavaPlugin {\n    @Override\n    public void onEnable() {\n        getServer().getPluginManager().registerEvents(new PlayerJoin(),this);\n        System.out.println(&amp;quot;插件SKY已经成功启动&amp;quot;);\n    }\n    @Override\n    public void onDisable() {\n        System.out.println(&amp;quot;插件SKY已经成功关闭&amp;quot;);\n    }\n\n}\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;然后就可以编译了。&lt;/p&gt;\n&lt;h2 id=\&#34;测试\&#34;&gt;测试&lt;/h2&gt;\n&lt;p&gt;&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596786646751.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;，我们可以看到他已经加载了，我们来给他一个颜色&lt;br&gt;\n我们在Event.setJoinMessage(&amp;quot;欢迎&amp;quot;+player+&amp;quot;加入了游戏&amp;quot;);中的&amp;quot;欢迎&amp;quot;前面输入ChatColor.color这个color输入你喜欢的颜色，比如红色就输入CharColor.RED&lt;br&gt;\n完整代码&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-Java\&#34;&gt;Event.setJoinMessage(ChatColor.RED+&amp;quot;欢迎&amp;quot;+player+&amp;quot;加入了游戏&amp;quot;);\n\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;如果你想要获得更多监听器的你可以去这个网站https://bukkit.windit.net/javadoc/，不会的在下面留言，问我。&lt;br&gt;\n好了这期就到这里了，我们下一期讲指令&lt;/p&gt;\n&#34;,&#34;fileName&#34;:&#34;Spigot开发(二)&#34;,&#34;abstract&#34;:&#34;&#34;,&#34;title&#34;:&#34;从零开始教你编写Spigot插件(二)&#34;,&#34;tags&#34;:[{&#34;index&#34;:-1,&#34;name&#34;:&#34;Java&#34;,&#34;slug&#34;:&#34;Java&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://Mallor-WYB.github.io/tag/Java/&#34;},{&#34;index&#34;:-1,&#34;name&#34;:&#34;Spigot教程&#34;,&#34;slug&#34;:&#34;spigot&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://Mallor-WYB.github.io/tag/spigot/&#34;}],&#34;date&#34;:&#34;2020-08-06 18:34:29&#34;,&#34;dateFormat&#34;:&#34;2020-08-06&#34;,&#34;feature&#34;:&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/Spigot%E5%BC%80%E5%8F%91(%E4%BA%94).png&#34;,&#34;link&#34;:&#34;https://Mallor-WYB.github.io/post/Spigot开发(二)/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;3 min read&#34;,&#34;time&#34;:134000,&#34;words&#34;:570,&#34;minutes&#34;:3},&#34;description&#34;:&#34;上一期我们讲到了怎么创建一个插件并打包导出运行，这一期我们开始讲解监听器(Listener)的用法\n首先创建一个类\n我们呢先创建一个包，直接在我们上次创建的包右键，然后点击package，然后再原来的包的后面有一个点，然后给他命名。我的包名...&#34;,&#34;toc&#34;:&#34;&lt;ul class=\&#34;markdownIt-TOC\&#34;&gt;\n&lt;li&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E9%A6%96%E5%85%88%E5%88%9B%E5%BB%BA%E4%B8%80%E4%B8%AA%E7%B1%BB\&#34;&gt;首先创建一个类&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#listener\&#34;&gt;Listener&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E7%BC%96%E8%AF%91\&#34;&gt;编译&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%B5%8B%E8%AF%95\&#34;&gt;测试&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&#34;},{&#34;content&#34;:&#34;&lt;p&gt;从这篇文章开始我来教大家开发Spigot插件&lt;br&gt;\n我会把代码放在Github上，地址&lt;a href=\&#34;https://github.com/Mallor-WYB/Spigot_Plugin\&#34;&gt;传送门&lt;/a&gt;&lt;br&gt;\n这个是我在bilibili上的教程视频，可以去看看&lt;/p&gt;\n&lt;iframe height=498 width=510 src=\&#34;//player.bilibili.com/player.html?aid=756437640&amp;bvid=BV1xr4y1K7Sa&amp;cid=290615844&amp;page=1\&#34;&gt;&lt;/iframe&gt;\n&lt;h2 id=\&#34;首先我们需要准备ide开发工具\&#34;&gt;首先我们需要准备IDE开发工具&lt;/h2&gt;\n&lt;p&gt;我所知道比较好的有两个IDE一个是IntelliJ IDEA和Eclipse,而我呢则是选择IDEA(比较推荐)。&lt;/p&gt;\n&lt;h2 id=\&#34;ide选择了然后下载开服核心和jdk\&#34;&gt;IDE选择了，然后下载开服核心和JDK&lt;/h2&gt;\n&lt;p&gt;大家可以去www.getbukkit.org去下载，记得选择Spigot核心。&lt;br&gt;\nJDK可以去oracle这里下载，记得注册一个账号。&lt;/p&gt;\n&lt;h2 id=\&#34;开始创建项目\&#34;&gt;开始创建项目&lt;/h2&gt;\n&lt;p&gt;我推荐新手去下载一个汉化，IDEA2020.1已经出来了官方的汉化，可以去官网下载。&lt;br&gt;\n然后打开idea, 选择新建项目，然后选择Maven，然后next，下面选择保存位置，然后打开下面的折叠页，第一个是包名，就是xxx.xxx.xxx的这样的格式，也就是把域名倒过来，记得全部小写。我的就是org.mallor.sky&lt;br&gt;\n然后下面的是项目名称不用管他，下面的是版本不用管。&lt;/p&gt;\n&lt;h2 id=\&#34;导入服务器核心\&#34;&gt;导入服务器核心&lt;/h2&gt;\n&lt;p&gt;创建完项目应该是这样的&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596685146631.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n然后再你的项目根目录新建一个文件夹,叫做lib(标准的依赖存放位置)，接着把你的开服包放进去。&lt;br&gt;\n在里面开服，直接再系统自带的文件管理新建就可以&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596685425342.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n开服务器应该都会吧，不会的话可以看我的视频，或者加我QQ私聊我639388807&lt;br&gt;\n我们点击文件，点击项目结构，找到模块，&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596685511350.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596685562494.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;然后点击右边的加，选择jar或者目录，直接选择lib目录下载开服核心就可以。&lt;/p&gt;\n&lt;h2 id=\&#34;创建一个包\&#34;&gt;创建一个包&lt;/h2&gt;\n&lt;p&gt;创建包应该很简单了，就是上文提到的xxx.xxx.xxx。&lt;br&gt;\n右键main中的java，然后点击新键&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596687251811.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596687302403.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n这个就是我们所需要的包名，你可以自定义，英文单词，记得小写，然后回车就可以&lt;br&gt;\n。&lt;/p&gt;\n&lt;h2 id=\&#34;新建一个类\&#34;&gt;新建一个类&lt;/h2&gt;\n&lt;p&gt;我们新建包之后开始创建主类，右键我们的包，然后点击新建Java类，输入我们类的名字不要有中文大小写都可以。&lt;br&gt;\n我直接叫他A了。创建完是这样的&lt;br&gt;\n&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596688105645.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;h2 id=\&#34;开始\&#34;&gt;开始！&lt;/h2&gt;\n&lt;p&gt;我们再我们的类(A)后面输入extends JavaPlugin，extends前面记得空格。&lt;br&gt;\n然后再{}里面输入&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-Java\&#34;&gt;@Override\npublic void onEnable() {\n}\n@Override\npublic void onDisable() {\n }\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;然后呢我们再public void onEnable{&lt;br&gt;\n}里插入    System.out.println(&amp;quot;&amp;quot;);再&amp;quot;&amp;quot;中间就是你想要说的话比如我的就是&lt;br&gt;\nSystem.out.println(&amp;quot;插件SKY已经成功启动&amp;quot;);&lt;br&gt;\n这个的意思是插件SKY已经成功启动，public void onEnable()这个的意思是启动时所要执行的命令，System.out.println这个只要是学过Java的应该都知道，打印某件事，所以这两个连起来就是当插件启动时，插件会说:”插件SKY已经成功启动“&lt;br&gt;\n一次类推我们在onDisable里面输入插件已经成功关闭也会在控制台输出。&lt;br&gt;\n你可以去试一试。&lt;br&gt;\n这时你的全部正确代码&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-Java\&#34;&gt;public class A extends JavaPlugin {\n    @Override\n    public void onEnable() {\n        System.out.println(&amp;quot;插件SKY已经成功启动&amp;quot;);\n    }\n    @Override\n    public void onDisable() {\n        System.out.println(&amp;quot;插件SKY已经成功关闭&amp;quot;);\n    }\n\n} \n&lt;/code&gt;&lt;/pre&gt;\n&lt;h2 id=\&#34;把插件导出\&#34;&gt;把插件导出&lt;/h2&gt;\n&lt;p&gt;既然我们已经制作了插件了，我们就需要把他导出来，我们点击文件项目结构&lt;br&gt;\n然后点击构件，点击+号，然后按照图片操作&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596690208762.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n会弹出这个页面&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596690230270.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n我们在mainclass那里添上你的包名加上你的主类，主类就是刚才新建的类。&lt;br&gt;\n就是像我这样&lt;br&gt;\norg.mallor.sky.A&lt;br&gt;\n然后点击确定，然后找到输出目录，因为我们之前已经开过服务器了，他会自动生成一个叫做Plugins的文件夹，这个就是存放插件的&lt;br&gt;\n我们把这个输出目录放进这里，这样我们构建完插件就可以直接运行服务器。&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596690653554.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596690658928.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n插件已经好了，剩下的我们还要给插件做一个身份证。&lt;br&gt;\n如果你用解压软件打开插件你会发现里面有一个plugin.yml的文件我们记事本把他打开，里面一般有3个基本变量，一个是name,main，version&lt;br&gt;\nname就是插件的名字，main，就是他的主类就是我们当时的org.mallor.sky.A&lt;br&gt;\nversoin就是插件的版本，我们直接1.0就可以了。&lt;br&gt;\n我们在我们项目的根目录下新建文件，&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596690868284.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596690892074.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n输入plugin.yml就回车&lt;br&gt;\n然后在里面输入三个变量&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-yml\&#34;&gt;name: \nmain:\nversion:\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;在:后面记得空格&lt;br&gt;\n这个是我的代码&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-yml\&#34;&gt;name: SKY\nmain: org.mallor.sky.A\nversion: 1.0\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;身份证已经做好了，剩下的就让他带上，不然和没做一样&lt;br&gt;\n我们点击文件，点击项目结构，然后打开构建。&lt;br&gt;\n&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596691145191.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n然后找到你的plugin.yml文件直接选择回车。&lt;br&gt;\n然后再点击包含着项目结构中，把他选择了&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596691224218.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n你的是没有点亮的，我们把他给打开。&lt;br&gt;\n点击确定退出。&lt;/p&gt;\n&lt;h2 id=\&#34;开始构建\&#34;&gt;开始构建&lt;/h2&gt;\n&lt;p&gt;插件做好了，我们就开始构建了。我们可以再菜单栏里看到有一个构建的按钮我们直接点击他，然后点击第一个&lt;br&gt;\n&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596691555893.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n我们就慢慢的等待他，构建完，然后我们再打开服务器，耐心的等待他开服。&lt;br&gt;\n我们会看到他会说插件已经成功运行&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/1596691704617.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n我们再输入pl指令，会看到有你的插件。&lt;br&gt;\n如果你的插件没有识别可能是你的插件在导入依赖没有搞好，再就是你的代码也有问题，或者plugin.yml文件没有构建。&lt;/p&gt;\n&#34;,&#34;fileName&#34;:&#34;Spigit开发(一)&#34;,&#34;abstract&#34;:&#34;&#34;,&#34;title&#34;:&#34;从零开始教你编写Spigot插件(一)&#34;,&#34;tags&#34;:[{&#34;index&#34;:-1,&#34;name&#34;:&#34;Java&#34;,&#34;slug&#34;:&#34;Java&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://Mallor-WYB.github.io/tag/Java/&#34;},{&#34;index&#34;:-1,&#34;name&#34;:&#34;Spigot教程&#34;,&#34;slug&#34;:&#34;spigot&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://Mallor-WYB.github.io/tag/spigot/&#34;}],&#34;date&#34;:&#34;2020-08-06 11:17:44&#34;,&#34;dateFormat&#34;:&#34;2020-08-06&#34;,&#34;feature&#34;:&#34;https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/Spigot%E5%BC%80%E5%8F%91(%E4%BA%94).png&#34;,&#34;link&#34;:&#34;https://Mallor-WYB.github.io/post/Spigit开发(一)/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;6 min read&#34;,&#34;time&#34;:311000,&#34;words&#34;:1437,&#34;minutes&#34;:6},&#34;description&#34;:&#34;从这篇文章开始我来教大家开发Spigot插件\n我会把代码放在Github上，地址传送门\n这个是我在bilibili上的教程视频，可以去看看\n\n首先我们需要准备IDE开发工具\n我所知道比较好的有两个IDE一个是IntelliJ IDEA和Ec...&#34;,&#34;toc&#34;:&#34;&lt;ul class=\&#34;markdownIt-TOC\&#34;&gt;\n&lt;li&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E9%A6%96%E5%85%88%E6%88%91%E4%BB%AC%E9%9C%80%E8%A6%81%E5%87%86%E5%A4%87ide%E5%BC%80%E5%8F%91%E5%B7%A5%E5%85%B7\&#34;&gt;首先我们需要准备IDE开发工具&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#ide%E9%80%89%E6%8B%A9%E4%BA%86%E7%84%B6%E5%90%8E%E4%B8%8B%E8%BD%BD%E5%BC%80%E6%9C%8D%E6%A0%B8%E5%BF%83%E5%92%8Cjdk\&#34;&gt;IDE选择了，然后下载开服核心和JDK&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%BC%80%E5%A7%8B%E5%88%9B%E5%BB%BA%E9%A1%B9%E7%9B%AE\&#34;&gt;开始创建项目&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%AF%BC%E5%85%A5%E6%9C%8D%E5%8A%A1%E5%99%A8%E6%A0%B8%E5%BF%83\&#34;&gt;导入服务器核心&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%88%9B%E5%BB%BA%E4%B8%80%E4%B8%AA%E5%8C%85\&#34;&gt;创建一个包&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%96%B0%E5%BB%BA%E4%B8%80%E4%B8%AA%E7%B1%BB\&#34;&gt;新建一个类&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%BC%80%E5%A7%8B\&#34;&gt;开始！&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%8A%8A%E6%8F%92%E4%BB%B6%E5%AF%BC%E5%87%BA\&#34;&gt;把插件导出&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%BC%80%E5%A7%8B%E6%9E%84%E5%BB%BA\&#34;&gt;开始构建&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&#34;},{&#34;content&#34;:&#34;&lt;blockquote&gt;\n&lt;p&gt;欢迎来到我的小站呀，很高兴遇见你！🤝&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;本站相关信息：&lt;br&gt;\n名称：拾染博客&lt;br&gt;\n地址：https://blog.srlove.top/&lt;br&gt;\nLogo: https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/20210424184016.jpg&lt;br&gt;\n简介：拾染博客，日常摸鱼，技术宅&lt;/p&gt;\n&lt;h2 id=\&#34;关于本站\&#34;&gt;🏠 关于本站&lt;/h2&gt;\n&lt;p&gt;可能每个人都有那么几个发泄点，可能我的发泄点就是我的博客。&lt;br&gt;\n我是一个渴望自己的想法被认可的性格，因为现实中害怕表达自己的不同观点，而且我也患有阳光抑郁症，所以我的性格可能古怪。 —— 这可能也是我建立独立博客的原因之一。&lt;/p&gt;\n&lt;h2 id=\&#34;博主是谁\&#34;&gt;👨‍💻 博主是谁&lt;/h2&gt;\n&lt;p&gt;SRlove（拾染爱恋）&lt;/p&gt;\n&lt;h2 id=\&#34;博主介绍\&#34;&gt;博主介绍&lt;/h2&gt;\n&lt;p&gt;我是一个内向的男孩子，可能我在生活中有时显得很外向，活泼，但我的内心确是非常的自闭，有时可能我的待人处事不是那么的好，而且我不擅长与别人交流，可能和别人独处时，会出现尴尬，回不上话之类的，请谅解。&lt;br&gt;\n为了更深刻了解自己，我也对自己性格做了分析：&lt;br&gt;\n离群，内省，喜欢独处而不喜欢接触人，与人保持一定距离，悲观，孤独，抑郁&lt;br&gt;\n我并没有因为我是阳光抑郁症患者而感到自卑，但我的性格就是这样，这可能永远也改变不了。&lt;/p&gt;\n&lt;h2 id=\&#34;关于梦想\&#34;&gt;关于梦想&lt;/h2&gt;\n&lt;p&gt;可能我的梦想听起来可笑，但我会用行动去证明。&lt;br&gt;\n我的梦想是成为一名软件工程师，并组建自己团队，以至于后来建立起自己的公司。&lt;/p&gt;\n&lt;h2 id=\&#34;兴趣爱好\&#34;&gt;⛹ 兴趣爱好&lt;/h2&gt;\n&lt;p&gt;Java,Minecraft,一部分的安卓程序制作，易程序，PHP&lt;/p&gt;\n&lt;h2 id=\&#34;联系我呀\&#34;&gt;📬 联系我呀&lt;/h2&gt;\n&lt;p&gt;QQ：639388807&lt;/p&gt;\n&lt;h2 id=\&#34;️重要问题\&#34;&gt;❗❗️重要问题&lt;/h2&gt;\n&lt;p&gt;本网站使用Github+Gridea所写，肯定会卡顿(挂梯子会快一点)，所以请不要担心。&lt;br&gt;\n请您耐心等待即可。&lt;br&gt;\n网站制作不易，还请dalao支持&lt;/p&gt;\n&#34;,&#34;fileName&#34;:&#34;about&#34;,&#34;abstract&#34;:&#34;&#34;,&#34;title&#34;:&#34;关于本博客&#34;,&#34;tags&#34;:[],&#34;date&#34;:&#34;2020-07-12 19:09:48&#34;,&#34;dateFormat&#34;:&#34;2020-07-12&#34;,&#34;feature&#34;:&#34;https://cdn.jsdelivr.net/gh/ITJoker233/BingPicApi/pic/20200520.png&#34;,&#34;link&#34;:&#34;https://Mallor-WYB.github.io/post/about/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:true,&#34;stats&#34;:{&#34;text&#34;:&#34;2 min read&#34;,&#34;time&#34;:101000,&#34;words&#34;:484,&#34;minutes&#34;:2},&#34;description&#34;:&#34;\n欢迎来到我的小站呀，很高兴遇见你！🤝\n\n本站相关信息：\n名称：拾染博客\n地址：https://blog.srlove.top/\nLogo: https://cdn.jsdelivr.net/gh/Mallor-WYB/cdn/img/2...&#34;,&#34;toc&#34;:&#34;&lt;ul class=\&#34;markdownIt-TOC\&#34;&gt;\n&lt;li&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%85%B3%E4%BA%8E%E6%9C%AC%E7%AB%99\&#34;&gt;🏠 关于本站&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%8D%9A%E4%B8%BB%E6%98%AF%E8%B0%81\&#34;&gt;👨‍💻 博主是谁&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%8D%9A%E4%B8%BB%E4%BB%8B%E7%BB%8D\&#34;&gt;博主介绍&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%85%B3%E4%BA%8E%E6%A2%A6%E6%83%B3\&#34;&gt;关于梦想&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%85%B4%E8%B6%A3%E7%88%B1%E5%A5%BD\&#34;&gt;⛹ 兴趣爱好&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E8%81%94%E7%B3%BB%E6%88%91%E5%91%80\&#34;&gt;📬 联系我呀&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%EF%B8%8F%E9%87%8D%E8%A6%81%E9%97%AE%E9%A2%98\&#34;&gt;❗❗️重要问题&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&#34;},{&#34;content&#34;:&#34;&lt;p&gt;此网站模拟earth网站，如有侵权请联系作者。&lt;/p&gt;\n&lt;iframe src=\&#34;https://earth.nullschool.net\&#34; width=100% height=1080&gt; &lt;/iframe&gt;&#34;,&#34;fileName&#34;:&#34;earth&#34;,&#34;abstract&#34;:&#34;&#34;,&#34;title&#34;:&#34;天气发布网站&#34;,&#34;tags&#34;:[],&#34;date&#34;:&#34;2020-07-06 10:17:40&#34;,&#34;dateFormat&#34;:&#34;2020-07-06&#34;,&#34;feature&#34;:&#34;&#34;,&#34;link&#34;:&#34;https://Mallor-WYB.github.io/post/earth/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;1 min read&#34;,&#34;time&#34;:3000,&#34;words&#34;:17,&#34;minutes&#34;:1},&#34;description&#34;:&#34;此网站模拟earth网站，如有侵权请联系作者。\n &#34;,&#34;toc&#34;:&#34;&#34;}]";
